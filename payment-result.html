<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付结果 — 鼎脉人脉</title>
  <link rel="icon" type="image/png" href="assets/icons8-teapot-material-outlined-32.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    .result-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:var(--space-xl); }
    .result-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl); padding:var(--space-3xl) var(--space-2xl); text-align:center; max-width:420px; width:100%; }
    .result-card::before { content:''; display:block; height:3px; background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-dark)); margin:calc(var(--space-3xl)*-1) calc(var(--space-2xl)*-1) var(--space-2xl); border-radius:var(--radius-xl) var(--radius-xl) 0 0; }
    .result-icon { font-size:64px; margin-bottom:var(--space-lg); }
    .result-title { font-family:var(--font-display); font-size:24px; font-weight:700; margin-bottom:var(--space-sm); }
    .result-desc { font-size:14px; color:var(--text-secondary); margin-bottom:var(--space-2xl); }
    .result-info { background:var(--bg-glass-light); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--space-lg); margin-bottom:var(--space-2xl); display:none; }
    .result-info__row { display:flex; justify-content:space-between; padding:var(--space-sm) 0; font-size:14px; }
    .result-info__label { color:var(--text-muted); }
    .result-info__value { font-weight:600; }
    .result-info__value--gold { color:var(--gold); font-family:var(--font-display); font-size:18px; }
    .spin-ring { width:64px; height:64px; border:3px solid rgba(201,169,110,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto var(--space-lg); }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="result-page">
    <div class="result-card animate-fade-in-up">
      <div class="result-icon" id="result-icon"><div class="spin-ring"></div></div>
      <div class="result-title" id="result-title">正在查询支付结果...</div>
      <div class="result-desc" id="result-desc">请稍候</div>
      <div class="result-info" id="result-info">
        <div class="result-info__row"><span class="result-info__label">订单号</span><span class="result-info__value" id="info-order"></span></div>
        <div class="result-info__row"><span class="result-info__label">充值金额</span><span class="result-info__value" id="info-amount"></span></div>
        <div class="result-info__row"><span class="result-info__label">获得积分</span><span class="result-info__value result-info__value--gold" id="info-points"></span></div>
      </div>
      <div id="result-actions"></div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script>
    const orderNo = new URLSearchParams(window.location.search).get('out_trade_no');
    if (!orderNo) { showResult('error','无效订单','未找到订单信息'); } else { pollOrder(); }

    async function pollOrder() {
      let n = 0;
      const timer = setInterval(async () => {
        n++;
        try {
          const d = await api.payment.getStatus(orderNo);
          if (d.status === 'paid') { clearInterval(timer); showResult('success','支付成功！','积分已到账',d); return; }
          if (d.status === 'rejected') { clearInterval(timer); showResult('error','支付失败','订单已被驳回'); return; }
          if (n >= 10) { clearInterval(timer); showResult('pending','支付确认中','如果已完成付款，积分将在几分钟内到账'); }
        } catch (e) {
          // 查询失败也继续轮询，不要显示失败
          if (n >= 15) { clearInterval(timer); showResult('pending','支付确认中','请到个人中心查看积分是否到账'); }
        }
      }, 2000);
    }

    function showResult(type, title, desc, data) {
      const icons = { success: '🎉', error: '❌', pending: '⏳' };
      document.getElementById('result-icon').textContent = icons[type] || '⏳';
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-desc').textContent = desc;
      const info = document.getElementById('result-info');
      if (data) { info.style.display = ''; document.getElementById('info-order').textContent = data.orderNo; document.getElementById('info-amount').textContent = '¥' + data.amount; document.getElementById('info-points').textContent = '+' + data.points; } else { info.style.display = 'none'; }
      document.getElementById('result-actions').innerHTML =
        type === 'success'
          ? '<a href="user.html" class="btn btn--primary btn--block" style="margin-bottom:var(--space-md)">查看我的积分</a><a href="list.html" class="btn btn--ghost btn--block">浏览资源</a>'
          : '<a href="user.html" class="btn btn--primary btn--block" style="margin-bottom:var(--space-md)">返回个人中心</a><a href="index.html" class="btn btn--ghost btn--block">返回首页</a>';
    }
  </script>
</body>
</html>
