<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 — 鼎脉人脉</title>
  <link rel="icon" type="image/png" href="assets/icons8-teapot-material-outlined-32.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      position: relative;
    }

    /* Left panel - decorative */
    .login-visual {
      flex: 1;
      background: var(--bg-secondary);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-3xl);
    }

    .login-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, rgba(201, 169, 110, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(201, 169, 110, 0.05) 0%, transparent 50%);
    }

    .login-visual__content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
    }

    .login-visual__logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 700;
      color: var(--bg-primary);
      margin: 0 auto var(--space-2xl);
      box-shadow: 0 8px 40px rgba(201, 169, 110, 0.3);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .login-visual__title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-lg);
      line-height: 1.3;
    }

    .login-visual__desc {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    .login-visual__stats {
      display: flex;
      justify-content: center;
      gap: var(--space-3xl);
      margin-top: var(--space-3xl);
    }

    .login-visual__stat-value {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
    }

    .login-visual__stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: var(--space-xs);
    }

    /* Floating decorative elements */
    .float-ring {
      position: absolute;
      border: 1px solid rgba(201, 169, 110, 0.1);
      border-radius: 50%;
      animation: floatRing 20s linear infinite;
    }

    .float-ring:nth-child(1) {
      width: 300px;
      height: 300px;
      top: -50px;
      right: -80px;
      animation-duration: 25s;
    }

    .float-ring:nth-child(2) {
      width: 200px;
      height: 200px;
      bottom: 10%;
      left: -40px;
      animation-duration: 20s;
      animation-direction: reverse;
    }

    .float-ring:nth-child(3) {
      width: 150px;
      height: 150px;
      top: 20%;
      right: 15%;
      border-color: rgba(201, 169, 110, 0.06);
      animation-duration: 15s;
    }

    @keyframes floatRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Right panel - form */
    .login-form-panel {
      width: 520px;
      min-width: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-3xl);
      background: var(--bg-primary);
      position: relative;
    }

    .login-form-wrapper {
      width: 100%;
      max-width: 380px;
    }

    .login-form-wrapper__header {
      margin-bottom: var(--space-2xl);
    }

    .login-form-wrapper__title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-sm);
    }

    .login-form-wrapper__subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .login-tabs {
      display: flex;
      gap: var(--space-xl);
      margin-bottom: var(--space-xl);
      border-bottom: 1px solid var(--border);
    }

    .login-tab {
      padding: var(--space-md) 0;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
    }

    .login-tab:hover {
      color: var(--text-secondary);
    }

    .login-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
      animation: fadeInUp 0.4s var(--ease-out);
    }

    .gift-banner {
      background: linear-gradient(135deg, rgba(201, 169, 110, 0.1), rgba(201, 169, 110, 0.05));
      border: 1px solid rgba(201, 169, 110, 0.2);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      margin-bottom: var(--space-xl);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .gift-banner__icon {
      font-size: 28px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .gift-banner__text {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .gift-banner__text strong {
      color: var(--gold);
    }

    .form-divider {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin: var(--space-xl) 0;
      color: var(--text-dim);
      font-size: 13px;
    }

    .form-divider::before,
    .form-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .login-visual {
        display: none;
      }

      .login-form-panel {
        width: 100%;
        min-width: auto;
      }
    }

    @media (max-width: 768px) {
      .login-form-panel {
        padding: var(--space-xl);
      }

      .login-form-wrapper__title {
        font-size: 24px;
      }

      .login-form-wrapper__subtitle {
        font-size: 14px;
      }

      .login-tabs {
        gap: var(--space-lg);
      }

      .login-tab {
        font-size: 14px;
      }

      .gift-banner {
        padding: var(--space-sm) var(--space-md);
      }

      .gift-banner__icon {
        font-size: 24px;
      }

      .gift-banner__text {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <!-- Left Visual Panel -->
    <div class="login-visual">
      <div class="float-ring"></div>
      <div class="float-ring"></div>
      <div class="float-ring"></div>
      <div class="login-visual__content">
        <div class="login-visual__logo">鼎</div>
        <h1 class="login-visual__title">高端人脉<br>触手可及</h1>
        <p class="login-visual__desc">
          精选优质商业人脉资源，精准对接行业核心人物。<br>
          加入鼎脉，打开通往高端人脉的大门。
        </p>
        <div class="login-visual__stats">
          <div>
            <div class="login-visual__stat-value" id="stat-resources">0</div>
            <div class="login-visual__stat-label">优质资源</div>
          </div>
          <div>
            <div class="login-visual__stat-value" id="stat-members">0</div>
            <div class="login-visual__stat-label">活跃会员</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Form Panel -->
    <div class="login-form-panel">
      <div class="login-form-wrapper animate-fade-in-up">
        <div class="login-form-wrapper__header">
          <h2 class="login-form-wrapper__title">欢迎加入</h2>
          <p class="login-form-wrapper__subtitle">登录您的账户，或创建新账户开始探索</p>
        </div>

        <div class="login-tabs">
          <div class="login-tab active" data-tab="login">登录</div>
          <div class="login-tab" data-tab="register">注册</div>
        </div>

        <!-- Login Form -->
        <div class="form-panel active" id="panel-login">
          <form id="login-form">
            <div class="form-group">
              <label class="form-label">用户名</label>
              <input type="text" class="form-input" id="login-username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
              <label class="form-label">密码</label>
              <input type="password" class="form-input" id="login-password" placeholder="请输入密码" required>
            </div>
            <div id="login-error" class="form-error mb-md" style="display:none"></div>
            <button type="submit" class="btn btn--primary btn--block btn--lg">登录</button>
          </form>
          <div class="form-divider">还没有账户？</div>
          <button class="btn btn--secondary btn--block" onclick="switchTab('register')">立即注册，领取20积分</button>
        </div>

        <!-- Register Form -->
        <div class="form-panel" id="panel-register">
          <div class="gift-banner">
            <span class="gift-banner__icon">🎁</span>
            <div class="gift-banner__text">
              新用户注册即送 <strong>20积分</strong>，可免费查看资源详情！
            </div>
          </div>
          <form id="register-form">
            <div class="form-group">
              <label class="form-label">用户名</label>
              <input type="text" class="form-input" id="reg-username" placeholder="设置您的用户名" required>
            </div>
            <div class="form-group">
              <label class="form-label">手机号（选填）</label>
              <input type="tel" class="form-input" id="reg-phone" placeholder="用于找回账户">
            </div>
            <div class="form-group">
              <label class="form-label">密码</label>
              <input type="password" class="form-input" id="reg-password" placeholder="设置6位以上密码" required>
            </div>
            <div class="form-group">
              <label class="form-label">确认密码</label>
              <input type="password" class="form-input" id="reg-password2" placeholder="再次输入密码" required>
            </div>
            <div id="register-error" class="form-error mb-md" style="display:none"></div>
            <button type="submit" class="btn btn--primary btn--block btn--lg">注册并领取积分</button>
          </form>
          <div class="form-divider">已有账户？</div>
          <button class="btn btn--ghost btn--block" onclick="switchTab('login')">返回登录</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script>
    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
    }

    document.querySelectorAll('.login-tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const btn = e.target.querySelector('button[type="submit"]');

      await Club.btnLoading(btn, async () => {
        try {
          await api.auth.login(username, password);
          Club.toast('登录成功，欢迎回来！', 'success');
          setTimeout(() => window.location.href = 'index.html', 800);
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.style.display = 'block';
        }
      });
    });

    // Register
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('reg-username').value.trim();
      const phone = document.getElementById('reg-phone').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;
      const errorEl = document.getElementById('register-error');

      if (password.length < 6) {
        errorEl.textContent = '密码长度不能少于6位';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== password2) {
        errorEl.textContent = '两次输入的密码不一致';
        errorEl.style.display = 'block';
        return;
      }

      const btn = e.target.querySelector('button[type="submit"]');

      await Club.btnLoading(btn, async () => {
        try {
          await api.auth.register(username, password, phone);
          Club.toast('注册成功！已赠送20积分 🎉', 'success');
          setTimeout(() => window.location.href = 'index.html', 1000);
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.style.display = 'block';
        }
      });
    });

    // Animate stats
    (async () => {
      try {
        const stats = await api.meta.getStats();
        setTimeout(() => {
          Club.animateCounter(document.getElementById('stat-resources'), stats.totalResources || 1268);
          Club.animateCounter(document.getElementById('stat-members'), stats.totalMembers || 8432);
        }, 500);
      } catch (e) {}
    })();

    // 主题切换（登录页也需要）
    Club.initTheme();

    // Redirect if already logged in
    if (Club.auth.isLoggedIn()) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
