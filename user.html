<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 — 鼎脉人脉</title>
  <link rel="icon" type="image/png" href="assets/icons8-teapot-material-outlined-32.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    .user-page {
      padding-top: calc(var(--nav-height) + var(--space-2xl));
      padding-bottom: var(--space-4xl);
      position: relative;
      z-index: 1;
    }

    /* Profile Card */
    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl);
      display: flex;
      align-items: center;
      gap: var(--space-xl);
      margin-bottom: var(--space-2xl);
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-dark));
    }

    .profile-card::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: radial-gradient(ellipse at right, rgba(201, 169, 110, 0.04), transparent);
      pointer-events: none;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--bg-primary);
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(201, 169, 110, 0.25);
    }

    .profile-info {
      flex: 1;
    }

    .profile-info__name {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }

    .profile-info__meta {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .profile-points {
      text-align: right;
      position: relative;
      z-index: 1;
    }

    .profile-points__label {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-xs);
    }

    .profile-points__value {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .profile-points__unit {
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-lg);
      margin-bottom: var(--space-2xl);
    }

    .stat-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      text-align: center;
    }

    .stat-item__value {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: var(--space-sm);
    }

    .stat-item__label {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Tabs */
    .user-tabs {
      display: flex;
      gap: var(--space-xl);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-xl);
    }

    .user-tab {
      padding: var(--space-md) 0;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
    }

    .user-tab:hover {
      color: var(--text-secondary);
    }

    .user-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.4s var(--ease-out);
    }

    /* Recharge Plans */
    .recharge-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-lg);
      margin-bottom: var(--space-2xl);
    }

    .recharge-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      text-align: center;
      cursor: pointer;
      transition: all 0.4s var(--ease-out);
      position: relative;
      overflow: hidden;
    }

    .recharge-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: var(--shadow-gold);
    }

    .recharge-card.popular {
      border-color: var(--gold);
    }

    .recharge-card.popular::before {
      content: '热门';
      position: absolute;
      top: 12px;
      right: -28px;
      background: var(--gold);
      color: var(--bg-primary);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 32px;
      transform: rotate(45deg);
    }

    .recharge-card__points {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: var(--space-xs);
    }

    .recharge-card__label {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
    }

    .recharge-card__price {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }

    .recharge-card__price span {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .recharge-card__bonus {
      font-size: 12px;
      color: var(--accent-green);
      margin-top: var(--space-sm);
      padding: 4px 12px;
      background: rgba(107, 170, 117, 0.1);
      border-radius: var(--radius-full);
      display: inline-block;
    }

    /* Transaction List */
    .tx-list {
      list-style: none;
    }

    .tx-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg) 0;
      border-bottom: 1px solid var(--border);
    }

    .tx-item:last-child {
      border-bottom: none;
    }

    .tx-item__left {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .tx-item__icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .tx-item__icon--gift {
      background: rgba(201, 169, 110, 0.15);
    }

    .tx-item__icon--recharge {
      background: rgba(107, 170, 117, 0.15);
    }

    .tx-item__icon--view {
      background: rgba(91, 143, 185, 0.15);
    }

    .tx-item__desc {
      font-size: 14px;
      color: var(--text-primary);
    }

    .tx-item__time {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .tx-item__amount {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
    }

    .tx-item__amount--positive {
      color: var(--accent-green);
    }

    .tx-item__amount--negative {
      color: var(--accent-red);
    }

    /* View Record */
    .view-record {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-md);
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
    }

    .view-record:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }

    .view-record__info {
      flex: 1;
    }

    .view-record__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .view-record__meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: var(--space-md);
    }

    .view-record__action {
      font-size: 13px;
      color: var(--gold);
    }

    @media (max-width: 768px) {
      .user-page { padding-top: calc(var(--nav-height) + var(--space-lg)); }
      .profile-card { flex-direction: column; text-align: center; padding: var(--space-lg); gap: var(--space-lg); }
      .profile-info { width: 100%; }
      .profile-info__name { font-size: 20px; }
      .profile-info__meta { justify-content: center; flex-wrap: wrap; gap: var(--space-sm); }
      .profile-points { text-align: center; }
      .profile-points__value { font-size: 36px; }
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: var(--space-sm); }
      .stat-item { padding: var(--space-md); }
      .stat-item__value { font-size: 24px; }
      .recharge-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-md); }
      .recharge-card { padding: var(--space-lg); }
      .recharge-card__points { font-size: 28px; }
      .recharge-card__price { font-size: 18px; }
      .user-tabs { gap: var(--space-md); overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .user-tabs::-webkit-scrollbar { display: none; }
      .user-tab { white-space: nowrap; font-size: 13px; padding: var(--space-sm) 0; }
      .view-record { padding: var(--space-md); }
      .view-record__title { font-size: 14px; }
      .view-record__meta { flex-wrap: wrap; gap: var(--space-xs); }
      .tx-item { padding: var(--space-md) 0; }
      .tx-item__desc { font-size: 13px; }
      .recharge-card__bonus { font-size: 10px; }
    }

    @media (max-width: 480px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .recharge-grid { grid-template-columns: 1fr 1fr; gap: var(--space-sm); }
      .recharge-card__price { font-size: 16px; }
    }

    /* Recharge success modal */
    .recharge-success {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s var(--ease-out);
    }

    .recharge-success.active {
      opacity: 1;
      visibility: visible;
    }

    .recharge-success__box {
      background: var(--bg-card);
      border: 2px solid var(--gold);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl) var(--space-3xl);
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.5s var(--ease-spring);
    }

    .recharge-success.active .recharge-success__box {
      transform: scale(1);
    }

    .recharge-success__icon {
      font-size: 64px;
      margin-bottom: var(--space-lg);
    }

    .recharge-success__title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: var(--space-sm);
    }

    .recharge-success__desc {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }

    .recharge-success__points {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: var(--space-xl);
    }
  </style>
</head>
<body>
  <div class="user-page">
    <div class="container container--narrow">
      <!-- Profile Card -->
      <div class="profile-card animate-fade-in-up">
        <div class="profile-avatar" id="profile-avatar">U</div>
        <div class="profile-info" style="flex:1">
          <div class="profile-info__name" id="profile-name">用户名</div>
          <div style="display:flex;align-items:center;gap:var(--space-sm);margin:4px 0">
            <span id="profile-level" style="font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px"></span>
            <span id="profile-level-title" style="font-size:12px;color:var(--text-muted)"></span>
          </div>
          <!-- Level Progress -->
          <div style="margin:8px 0">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:4px">
              <span>经验 <span id="profile-exp">0</span></span>
              <span id="profile-next-exp">下一级需要 0</span>
            </div>
            <div style="height:6px;background:var(--bg-elevated);border-radius:3px;overflow:hidden">
              <div id="profile-exp-bar" style="height:100%;border-radius:3px;transition:width 0.5s var(--ease-out)"></div>
            </div>
          </div>
          <div class="profile-info__meta">
            <span id="profile-phone">未绑定手机</span>
            <span id="profile-date">注册时间</span>
          </div>
        </div>
        <div class="profile-points">
          <div class="profile-points__label">积分余额</div>
          <div class="profile-points__value"><span id="profile-points">0</span><span class="profile-points__unit"> 分</span></div>
        </div>
      </div>

      <!-- Check-in -->
      <div class="card animate-fade-in-up delay-1" style="padding:var(--space-xl); margin-bottom:var(--space-2xl); display:flex; align-items:center; justify-content:space-between; gap:var(--space-lg); flex-wrap:wrap" id="checkin-card">
        <div style="display:flex; align-items:center; gap:var(--space-lg)">
          <div style="font-size:36px">📅</div>
          <div>
            <div style="font-weight:600; font-size:15px; margin-bottom:2px">每日签到</div>
            <div style="font-size:13px; color:var(--text-muted)" id="checkin-info">签到可获得积分奖励</div>
          </div>
        </div>
        <div style="display:flex; align-items:center; gap:var(--space-lg)">
          <div style="text-align:center" id="checkin-streak-wrap" style="display:none">
            <div style="font-family:var(--font-display); font-size:24px; font-weight:700; color:var(--gold)" id="checkin-streak">0</div>
            <div style="font-size:11px; color:var(--text-dim)">连续签到</div>
          </div>
          <button class="btn btn--primary" id="checkin-btn" onclick="doCheckin()">签到</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row animate-fade-in-up delay-1">
        <div class="stat-item">
          <div class="stat-item__value" id="stat-viewed">0</div>
          <div class="stat-item__label">已查看资源</div>
        </div>
        <div class="stat-item">
          <div class="stat-item__value" id="stat-spent">0</div>
          <div class="stat-item__label">累计消耗积分</div>
        </div>
        <div class="stat-item">
          <div class="stat-item__value" id="stat-recharged">0</div>
          <div class="stat-item__label">累计充值积分</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="user-tabs animate-fade-in-up delay-2">
        <div class="user-tab active" data-tab="recharge">积分充值</div>
        <div class="user-tab" data-tab="favorites">我的收藏</div>
        <div class="user-tab" data-tab="submissions">我的发布</div>
        <div class="user-tab" data-tab="myposts">我的帖子</div>
        <div class="user-tab" data-tab="orders">充值订单</div>
        <div class="user-tab" data-tab="records">已查看记录</div>
        <div class="user-tab" data-tab="transactions">积分流水</div>
        <div class="user-tab" data-tab="password">密码设置</div>
      </div>

      <!-- Recharge Tab -->
      <div class="tab-content active" id="tab-recharge">
        <div class="recharge-grid" id="recharge-grid">
          <!-- JS rendered -->
        </div>
        <div class="card" style="padding: var(--space-xl); text-align: center;">
          <p style="font-size: 14px; color: var(--text-secondary); line-height: 1.8;">
            💡 积分仅用于查看资源联系方式，一次解锁永久可查看。<br>
            选择套餐后将跳转支付宝完成付款，付款成功积分自动到账。<br>
            如遇问题请联系客服。
          </p>
        </div>
      </div>

      <!-- View Records Tab -->
      <div class="tab-content" id="tab-records">
        <div id="records-list"></div>
        <div id="records-pagination" style="display:flex;justify-content:center;gap:var(--space-sm);margin-top:var(--space-xl);flex-wrap:wrap"></div>
      </div>

      <!-- Transactions Tab -->
      <div class="tab-content" id="tab-transactions">
        <div class="card" style="padding: 0; overflow: hidden;">
          <ul class="tx-list" id="tx-list" style="padding: 0 var(--space-xl);">
          </ul>
        </div>
        <div id="tx-pagination" style="display:flex;justify-content:center;gap:var(--space-sm);margin-top:var(--space-xl);flex-wrap:wrap"></div>
      </div>

      <!-- Favorites Tab -->
      <div class="tab-content" id="tab-favorites">
        <div id="favorites-list"></div>
      </div>

      <!-- Submissions Tab -->
      <div class="tab-content" id="tab-submissions">
        <div id="submissions-list"></div>
      </div>

      <!-- My Posts Tab -->
      <div class="tab-content" id="tab-myposts">
        <div id="myposts-list"></div>
      </div>

      <!-- Orders Tab -->
      <div class="tab-content" id="tab-orders">
        <div id="my-orders-list"></div>
      </div>

      <!-- Password Tab -->
      <div class="tab-content" id="tab-password">
        <div style="display:flex;justify-content:center">
          <div class="card" style="padding:var(--space-2xl); max-width:480px; width:100%;">
            <h3 style="font-family:var(--font-display);font-size:18px;margin-bottom:var(--space-xl);text-align:center">修改密码</h3>
            <div class="form-group">
              <label class="form-label">原密码</label>
              <input type="password" class="form-input" id="set-pw-old">
            </div>
            <div class="form-group">
              <label class="form-label">新密码</label>
              <input type="password" class="form-input" id="set-pw-new" placeholder="至少6位">
            </div>
            <div class="form-group">
              <label class="form-label">确认新密码</label>
              <input type="password" class="form-input" id="set-pw-new2">
            </div>
            <button class="btn btn--primary btn--block" onclick="changeMyPw()">修改密码</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Recharge Success Modal -->
  <div class="recharge-success" id="recharge-success">
    <div class="recharge-success__box">
      <div class="recharge-success__icon">💎</div>
      <div class="recharge-success__title">充值成功！</div>
      <div class="recharge-success__desc">积分已到账</div>
      <div class="recharge-success__points" id="success-points">+0</div>
      <button class="btn btn--primary" onclick="closeRechargeSuccess()">好的</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script>
    (async () => {
    // Require auth
    if (!Club.auth.requireAuth()) return;
    await Club.initPage('user');

    // Tab switching
    document.querySelectorAll('.user-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.user-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      });
    });

    // 通用分页
    function renderPagePag(containerId, total, pageSize, current, loadFn) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const totalPages = Math.ceil(total / pageSize);
      if (totalPages <= 1) { container.innerHTML = ''; return; }
      let html = '';
      if (current > 1) html += `<button class="btn btn--ghost btn--sm" onclick="(${loadFn.name})(${current-1})">‹</button>`;
      const s = Math.max(1, current-2), e = Math.min(totalPages, current+2);
      if (s > 1) { html += `<button class="btn btn--ghost btn--sm" onclick="(${loadFn.name})(1)">1</button>`; if (s > 2) html += `<span style="color:var(--text-dim);padding:0 6px">···</span>`; }
      for (let i = s; i <= e; i++) html += `<button class="btn ${i===current?'btn--primary':'btn--ghost'} btn--sm" onclick="(${loadFn.name})(${i})">${i}</button>`;
      if (e < totalPages) { if (e < totalPages-1) html += `<span style="color:var(--text-dim);padding:0 6px">···</span>`; html += `<button class="btn btn--ghost btn--sm" onclick="(${loadFn.name})(${totalPages})">${totalPages}</button>`; }
      if (current < totalPages) html += `<button class="btn btn--ghost btn--sm" onclick="(${loadFn.name})(${current+1})">›</button>`;
      container.innerHTML = html;
    }

    // Render profile
    async function renderProfile() {
      try {
        const u = await api.auth.getMe();
        const avatarEl = document.getElementById('profile-avatar');
        if (u.avatar) {
          avatarEl.innerHTML = `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
        } else {
          avatarEl.textContent = u.username.charAt(0).toUpperCase();
        }
        document.getElementById('profile-name').textContent = u.username;
        document.getElementById('profile-phone').textContent = u.phone || '未绑定手机';
        document.getElementById('profile-date').textContent = '注册于 ' + Club.formatDate(u.createdAt);
        document.getElementById('profile-points').textContent = u.points;
        // 等级信息
        const lvEl = document.getElementById('profile-level');
        if (lvEl && u.level) {
          lvEl.textContent = 'Lv.' + u.level;
          lvEl.style.background = u.levelColor + '22';
          lvEl.style.color = u.levelColor;
          lvEl.style.border = '1px solid ' + u.levelColor + '33';
          document.getElementById('profile-level-title').textContent = u.levelTitle || '';

            method: 'POST',

        }

        const iconMap = {
          'register_gift': { icon: '🎁', cls: 'gift' },
          'recharge': { icon: '💎', cls: 'recharge' },
          'view': { icon: '👁️', cls: 'view' },
          'checkin': { icon: '📅', cls: 'gift' },
          'admin_adjust': { icon: '⚙️', cls: 'recharge' },
          'levelup': { icon: '⬆️', cls: 'recharge' },
        };

        const start = (txPage - 1) * TX_PAGE_SIZE;
        const pageTxs = allTxs.slice(start, start + TX_PAGE_SIZE);

        container.innerHTML = pageTxs.map(tx => {
          const info = iconMap[tx.type] || { icon: '📋', cls: 'view' };
          const isPositive = tx.amount > 0;
          return `
            <li class="tx-item">
              <div class="tx-item__left">
                <div class="tx-item__icon tx-item__icon--${info.cls}">${info.icon}</div>
                <div>
                  <div class="tx-item__desc">${tx.desc}</div>
                  <div class="tx-item__time">${Club.formatDate(tx.createdAt)}</div>
                </div>
              </div>
              <div class="tx-item__amount ${isPositive ? 'tx-item__amount--positive' : 'tx-item__amount--negative'}">
                ${isPositive ? '+' : ''}${tx.amount}
              </div>
            </li>
          `;
        }).join('');

        renderPagePag('tx-pagination', allTxs.length, TX_PAGE_SIZE, txPage, loadTxs);
      } catch (e) {}
    }
    loadTxs(1);

  })(); // end async
  </script>
</body>
</html>
