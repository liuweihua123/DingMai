<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帖子详情 — 鼎脉人脉</title>
  <link rel="icon" type="image/png" href="assets/icons8-teapot-material-outlined-32.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    .post-page { padding-top: calc(var(--nav-height) + var(--space-2xl)); padding-bottom: var(--space-4xl); position: relative; z-index: 1; }
    .post-detail { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-2xl); margin-bottom: var(--space-2xl); }
    .post-detail__header { display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-xl); }
    .post-detail__avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: var(--bg-primary); }
    .post-detail__author { font-weight: 600; font-size: 15px; }
    .post-detail__time { font-size: 12px; color: var(--text-dim); }
    .post-detail__title { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-bottom: var(--space-xl); line-height: 1.3; }
    .post-detail__content { font-size: 16px; color: var(--text-secondary); line-height: 1.9; margin-bottom: var(--space-xl); }
    .post-detail__content img { max-width: 100%; border-radius: var(--radius-md); margin: var(--space-md) 0; }
    .post-detail__actions { display: flex; gap: var(--space-lg); padding-top: var(--space-lg); border-top: 1px solid var(--border); }
    .action-btn { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-muted); cursor: pointer; padding: 8px 16px; border-radius: var(--radius-full); transition: all 0.3s; border: none; background: none; }
    .action-btn:hover { background: rgba(255,255,255,0.04); color: var(--text-secondary); }
    .action-btn.liked { color: var(--gold); }
    .action-btn svg { width: 18px; height: 18px; }

    /* Replies */
    .replies-section { margin-top: var(--space-2xl); }
    .replies-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin-bottom: var(--space-xl); }
    .reply-item { display: flex; gap: var(--space-md); padding: var(--space-lg) 0; border-bottom: 1px solid var(--border); }
    .reply-item:last-child { border-bottom: none; }
    .reply-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--bg-primary); flex-shrink: 0; }
    .reply-body { flex: 1; min-width: 0; }
    .reply-header { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: 4px; }
    .reply-author { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .reply-time { font-size: 11px; color: var(--text-dim); }
    .reply-content { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: var(--space-sm); }
    .reply-actions { display: flex; gap: var(--space-md); }
    .reply-action { font-size: 12px; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; gap: 4px; transition: color 0.3s; background: none; border: none; padding: 0; }
    .reply-action:hover { color: var(--gold); }
    .reply-action.liked { color: var(--gold); }
    .reply-action svg { width: 14px; height: 14px; }

    /* Nested replies */
    .reply-children { margin-left: 44px; border-left: 2px solid var(--border); padding-left: var(--space-lg); margin-top: var(--space-sm); }
    .reply-children .reply-item { padding: var(--space-md) 0; }

    /* Reply form */
    .reply-form { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-xl); margin-top: var(--space-xl); }
    .reply-form__title { font-size: 15px; font-weight: 600; margin-bottom: var(--space-md); }
    .reply-form textarea { min-height: 80px; margin-bottom: var(--space-md); }
    .reply-form__reply-to { font-size: 12px; color: var(--gold); margin-bottom: var(--space-sm); display: none; }
    .reply-form__reply-to span { cursor: pointer; margin-left: var(--space-sm); color: var(--text-dim); }

    /* Report modal */
    .report-reasons { display: flex; flex-direction: column; gap: var(--space-sm); margin-bottom: var(--space-lg); }
    .report-reasons label { display: flex; align-items: center; gap: var(--space-sm); font-size: 14px; color: var(--text-secondary); cursor: pointer; padding: var(--space-sm); border-radius: var(--radius-sm); transition: background 0.2s; }
    .report-reasons label:hover { background: rgba(255,255,255,0.03); }
    .report-reasons input[type="radio"] { accent-color: var(--gold); }
  </style>
</head>
<body>
  <div class="post-page">
    <div class="container container--narrow">
      <!-- Breadcrumb -->
      <div class="breadcrumb animate-fade-in" style="margin-bottom:var(--space-xl)">
        <a href="forum.html">社区论坛</a>
        <span class="breadcrumb__sep">/</span>
        <span id="breadcrumb-title" style="color:var(--text-secondary)">帖子详情</span>
      </div>

      <!-- Post Detail -->
      <div class="post-detail animate-fade-in-up" id="post-detail">
        <div class="post-detail__header">
          <div class="post-detail__avatar" id="post-avatar">U</div>
          <div>
            <div class="post-detail__author" id="post-author"></div>
            <div style="display:flex;align-items:center;gap:var(--space-sm)">
              <span id="post-level" style="font-size:11px;font-weight:500;padding:1px 6px;border-radius:4px"></span>
              <span id="post-level-title" style="font-size:11px;color:var(--text-dim)"></span>
            </div>
            <div class="post-detail__time" id="post-time"></div>
          </div>
        </div>
        <h1 class="post-detail__title" id="post-title"></h1>
        <div class="post-detail__content" id="post-content"></div>
        <div class="post-detail__actions">
          <button class="action-btn" id="like-btn" onclick="toggleLike()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span id="like-count">0</span>
          </button>
          <button class="action-btn" onclick="scrollToReply()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            回复
          </button>
          <button class="action-btn" onclick="openReport('post')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
            举报
          </button>
        </div>
      </div>

      <!-- Replies -->
      <div class="replies-section animate-fade-in-up delay-1">
        <div class="replies-title">回复 (<span id="replies-count">0</span>)</div>
        <div id="replies-list"></div>
      </div>

      <!-- Reply Form -->
      <div class="reply-form animate-fade-in-up delay-2" id="reply-form">
        <div class="reply-form__title">发表回复</div>
        <div class="reply-form__reply-to" id="reply-to">
          回复 <strong id="reply-to-name"></strong>
          <span onclick="cancelReply()">取消</span>
        </div>
        <textarea class="form-input" id="reply-content" placeholder="说点什么..."></textarea>
        <button class="btn btn--primary" onclick="submitReply()" id="reply-btn">回复</button>
      </div>
    </div>
  </div>

  <!-- Report Modal -->
  <div class="modal-overlay" id="report-modal">
    <div class="modal" style="max-width:400px">
      <h3 style="font-family:var(--font-display);font-size:20px;margin-bottom:var(--space-xl)">举报</h3>
      <div class="report-reasons">
        <label><input type="radio" name="report-reason" value="垃圾广告"> 垃圾广告</label>
        <label><input type="radio" name="report-reason" value="虚假信息"> 虚假信息</label>
        <label><input type="radio" name="report-reason" value="违规内容"> 违规内容</label>
        <label><input type="radio" name="report-reason" value="恶意骚扰"> 恶意骚扰</label>
        <label><input type="radio" name="report-reason" value="其他"> 其他</label>
      </div>
      <div id="report-error" class="form-error" style="display:none;margin-bottom:var(--space-md)"></div>
      <div style="display:flex;gap:var(--space-md)">
        <button class="btn btn--ghost" style="flex:1" onclick="document.getElementById('report-modal').classList.remove('active')">取消</button>
        <button class="btn btn--primary" style="flex:1" onclick="submitReport()">提交举报</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script>
    Club.initPage('');
    const postId = Club.getParam('id');
    let postData = null;
    let replyToId = null;
    let reportTarget = { type: '', id: null };

    // Load post
    async function loadPost() {
      try {
        console.log('Loading post, ID:', postId);
        postData = await api.request('/forum/posts/' + postId);
        console.log('Post loaded:', postData.title, 'content length:', postData.content?.length);
        document.title = postData.title + ' — 鼎脉人脉';
        document.getElementById('breadcrumb-title').textContent = postData.title;
        const avatarEl = document.getElementById('post-avatar');
        if (postData.authorAvatar) {
          avatarEl.innerHTML = '<img src="' + postData.authorAvatar + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
        } else {
          avatarEl.textContent = (postData.author || '?').charAt(0).toUpperCase();
        }
        document.getElementById('post-author').textContent = postData.author || '';
        const levelEl = document.getElementById('post-level');
        levelEl.textContent = 'Lv.' + (postData.authorLevel || 1);
        levelEl.style.background = (postData.authorLevelColor || '#a09888') + '22';
        levelEl.style.color = postData.authorLevelColor || '#a09888';
        levelEl.style.border = '1px solid ' + (postData.authorLevelColor || '#a09888') + '33';
        document.getElementById('post-level-title').textContent = postData.authorLevelTitle || '';
        document.getElementById('post-time').textContent = Club.formatDate(postData.createdAt);
        document.getElementById('post-title').textContent = postData.title;
        document.getElementById('post-content').innerHTML = postData.content || '';

        // 更新标签
        if (postData.tags && postData.tags.length) {
          const tagsEl = document.getElementById('detail-tags');
          if (tagsEl) tagsEl.innerHTML = postData.tags.map(t => '<span class="tag">' + t + '</span>').join('');
        }
        document.getElementById('like-count').textContent = postData.likesCount;
        updateLikeBtn();
      } catch (e) {
        console.error('Load post error:', e);
        document.getElementById('post-detail').innerHTML = '<div class="empty-state"><div class="empty-state__icon">😕</div><div class="empty-state__text">帖子不存在或已被删除</div><a href="forum.html" class="btn btn--primary btn--sm mt-lg">返回论坛</a></div>';
      }
    }

    // Like
    let isLiked = false;
    function updateLikeBtn() {
      const btn = document.getElementById('like-btn');
      if (!btn) return;
      const svg = btn.querySelector('svg');
      if (!svg) return;
      if (isLiked) {
        btn.classList.add('liked');
        svg.setAttribute('fill', 'var(--gold)');
        svg.setAttribute('stroke', 'var(--gold)');
      } else {
        btn.classList.remove('liked');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor');
      }
    }

    async function toggleLike() {
      if (!api.auth.isLoggedIn()) { Club.toast('请先登录', 'info'); return; }
      try {
        const result = await api.request(`/forum/posts/${postId}/like`, { method: 'POST' });
        isLiked = result.liked;
        const countEl = document.getElementById('like-count');
        countEl.textContent = parseInt(countEl.textContent) + (isLiked ? 1 : -1);
        updateLikeBtn();
      } catch (e) { Club.toast('操作失败', 'error'); }
    }

    // Replies
    async function loadReplies() {
      try {
        const replies = await api.request(`/forum/posts/${postId}/replies`);
        document.getElementById('replies-count').textContent = countAllReplies(replies);
        const container = document.getElementById('replies-list');
        if (!replies.length) {
          container.innerHTML = '<div style="text-align:center;padding:var(--space-2xl);color:var(--text-dim)">暂无回复，快来抢沙发！</div>';
          return;
        }
        container.innerHTML = replies.map(r => renderReply(r)).join('');
      } catch (e) {}
    }

    function countAllReplies(replies) {
      let count = replies.length;
      replies.forEach(r => { count += r.children ? r.children.length : 0; });
      return count;
    }

    function renderReply(r, isChild) {
      const likeIcon = r.liked
        ? '<svg viewBox="0 0 24 24" fill="var(--gold)" stroke="var(--gold)" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';

      let html = `
        <div class="reply-item">
          <div class="reply-avatar">${r.author.charAt(0).toUpperCase()}</div>
          <div class="reply-body">
            <div class="reply-header">
              <span class="reply-author">${r.author}</span>
              <span class="reply-time">${Club.formatDate(r.createdAt)}</span>
            </div>
            <div class="reply-content">${r.content.replace(/\n/g, '<br>')}</div>
            <div class="reply-actions">
              <button class="reply-action ${r.liked ? 'liked' : ''}" onclick="toggleReplyLike(${r.id}, this)">
                ${likeIcon} ${r.likesCount}
              </button>
              <button class="reply-action" onclick="setReplyTo(${r.id}, '${r.author}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                回复
              </button>
              <button class="reply-action" onclick="openReport('reply', ${r.id})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                举报
              </button>
            </div>
          </div>
        </div>
      `;
      if (r.children && r.children.length) {
        html += '<div class="reply-children">';
        r.children.forEach(c => { html += renderReply(c, true); });
        html += '</div>';
      }
      return html;
    }

    // Reply actions
    function setReplyTo(replyId, author) {
      replyToId = replyId;
      document.getElementById('reply-to').style.display = '';
      document.getElementById('reply-to-name').textContent = author;
      document.getElementById('reply-content').focus();
    }

    function cancelReply() {
      replyToId = null;
      document.getElementById('reply-to').style.display = 'none';
    }

    function scrollToReply() {
      document.getElementById('reply-form').scrollIntoView({ behavior: 'smooth' });
      document.getElementById('reply-content').focus();
    }

    async function submitReply() {
      const content = document.getElementById('reply-content').value.trim();
      if (!content) { Club.toast('请输入回复内容', 'error'); return; }
      if (!api.auth.isLoggedIn()) { Club.toast('请先登录', 'info'); return; }

      const btn = document.getElementById('reply-btn');
      await Club.btnLoading(btn, async () => {
        try {
          await api.request(`/forum/posts/${postId}/replies`, {
            method: 'POST',
            body: JSON.stringify({ content, parentId: replyToId }),
          });
          document.getElementById('reply-content').value = '';
          cancelReply();
          Club.toast('回复成功', 'success');
          loadReplies();
          const countEl = document.getElementById('replies-count');
          countEl.textContent = parseInt(countEl.textContent) + 1;
        } catch (err) {
          Club.toast(err.message || '回复失败', 'error');
        }
      });
    }

    async function toggleReplyLike(replyId, btn) {
      if (!api.auth.isLoggedIn()) { Club.toast('请先登录', 'info'); return; }
      try {
        const result = await api.request(`/forum/replies/${replyId}/like`, { method: 'POST' });
        const countSpan = btn;
        const currentCount = parseInt(countSpan.textContent.trim());
        countSpan.innerHTML = result.liked
          ? '<svg viewBox="0 0 24 24" fill="var(--gold)" stroke="var(--gold)" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + (currentCount + (result.liked ? 1 : -1))
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + (currentCount - 1);
        if (result.liked) btn.classList.add('liked'); else btn.classList.remove('liked');
      } catch (e) {}
    }

    // Report
    function openReport(type, id) {
      if (!api.auth.isLoggedIn()) { Club.toast('请先登录', 'info'); return; }
      reportTarget = { type, id: id || postId };
      document.getElementById('report-modal').classList.add('active');
    }

    async function submitReport() {
      const reason = document.querySelector('input[name="report-reason"]:checked');
      if (!reason) { document.getElementById('report-error').textContent = '请选择举报原因'; document.getElementById('report-error').style.display = ''; return; }

      try {
        await api.request('/forum/report', {
          method: 'POST',
          body: JSON.stringify({ targetType: reportTarget.type, targetId: reportTarget.id, reason: reason.value }),
        });
        document.getElementById('report-modal').classList.remove('active');
        Club.toast('举报已提交', 'success');
      } catch (err) {
        document.getElementById('report-error').textContent = err.message || '举报失败';
        document.getElementById('report-error').style.display = '';
      }
    }

    // Init
    loadPost().then(() => {
      if (postData) {
        isLiked = postData.liked || false;
        updateLikeBtn();
      }
    }).catch(() => {});
    loadReplies();
  </script>
</body>
</html>
